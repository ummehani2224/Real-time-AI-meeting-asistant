services:
  - type: web
    name: vocalis-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Render will prompt you for this value during deployment
      - key: DATABASE_URL
        value: sqlite:///./sql_app.db
      - key: DEBUG
        value: "True"
